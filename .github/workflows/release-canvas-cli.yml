name: Build and Release canvas-cli

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-canvas-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            binary: canvas-cli
          - os: macos-latest
            platform: macos-x64
            binary: canvas-cli
          - os: windows-latest
            platform: windows-x64
            binary: canvas-cli.exe

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release -p canvas-cli

      - name: Package binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.binary }} dist/
          cd dist
          zip -r ../canvas-cli-${{ matrix.platform }}.zip ${{ matrix.binary }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/${{ matrix.binary }} dist/${{ matrix.binary }}
          Compress-Archive -Path dist/${{ matrix.binary }} -DestinationPath canvas-cli-${{ matrix.platform }}.zip -Force

      - name: Upload zipped artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-${{ matrix.platform }}
          path: canvas-cli-${{ matrix.platform }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: asset-*
          path: release-artifacts
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.run_number }}-${{ github.sha }}
          name: canvas-cli main build #${{ github.run_number }}
          files: release-artifacts/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          target_commitish: ${{ github.sha }}
          make_latest: false
